<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: -apple-system, Arial, sans-serif; font-size: 13px; margin: 10px; color: #202124; }
    h3 { margin: 4px 0 2px; }
    .hint { color: #5f6368; font-size: 11px; margin: 0 0 10px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 3px;
            border: 1px solid #dadce0; border-radius: 4px; }
    .sec { background:#f1f3f4; border-radius:6px; padding:8px 10px; margin-top:12px; }
    button { margin-top: 14px; width: 100%; padding: 9px; border: none; border-radius: 4px;
             background: #1a73e8; color: #fff; font-weight: 600; cursor: pointer; }
    #msg { margin-top: 10px; font-size: 12px; color: #137333; }
    a { color: #1a73e8; }
  </style>
</head>
<body>
  <h3>Account</h3>
  <p class="hint">Changes per account. Digits only (no dashes).</p>
  <label>Customer ID</label>
  <input id="customerId" placeholder="1234567890">
  <label>Login / Manager (MCC) ID <span class="hint">— leave blank if no MCC</span></label>
  <input id="loginCustomerId" placeholder="same as Customer ID if none">

  <div class="sec">
    <h3>Credentials <span class="hint">(set once — reusable across accounts)</span></h3>
    <p class="hint">Full walkthrough: see CREDENTIALS.md in the repo. Leave a secret
       blank to keep the existing value.</p>
    <label>OAuth Client ID</label>
    <input id="oauthClientId" placeholder="...apps.googleusercontent.com">
    <label>OAuth Client Secret</label>
    <input id="oauthClientSecret" type="password" placeholder="••••••••">
    <label>Developer Token</label>
    <input id="developerToken" type="password" placeholder="••••••••">
    <label>Refresh Token</label>
    <input id="refreshToken" type="password" placeholder="1//••••••••">
  </div>

  <h3 style="margin-top:14px">Target</h3>
  <label>Target ROAS</label>
  <input id="targetRoas" placeholder="3.0">

  <button onclick="save()">Save</button>
  <div id="msg"></div>

  <script>
    // Pre-fill from stored values.
    google.script.run.withSuccessHandler(function (v) {
      for (var k in v) { var el = document.getElementById(k); if (el) el.value = v[k] === '••••••••' ? '' : v[k];
        if (el && v[k] === '••••••••') el.placeholder = '•••• (saved — leave blank to keep)'; }
    }).loadSetup();

    function save() {
      var ids = ['customerId','loginCustomerId','oauthClientId','oauthClientSecret',
                 'developerToken','refreshToken','targetRoas'];
      var form = {};
      ids.forEach(function (k) { form[k] = document.getElementById(k).value; });
      document.getElementById('msg').textContent = 'Saving…';
      google.script.run
        .withSuccessHandler(function (m) { document.getElementById('msg').textContent = m; })
        .withFailureHandler(function (e) { document.getElementById('msg').style.color = '#c5221f';
          document.getElementById('msg').textContent = 'Error: ' + e.message; })
        .saveSetup(form);
    }
  </script>
</body>
</html>
